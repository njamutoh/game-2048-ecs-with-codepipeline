version: 0.2

phases:
  pre_build:
    commands:
     - echo Logging in to Amazon ECR...
     - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 247606490890.dkr.ecr.us-east-1.amazonaws.com
      
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t 2048-gamerepo .
      - echo Tagging the Docker image...
      - docker tag 2048-gamerepo:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Creating imagedefinitions.json file for ECS deployment...
      - printf '[{"name":"2048-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
